<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SubtitleAI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      background: #0f0f14;
      font-family: 'Inter', sans-serif;
      color: #e8e4dc;
      padding: 0;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: #13131a;
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #c8a97e, #8b6f47);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .logo-text h1 {
      font-size: 15px;
      font-weight: 600;
      color: #f0ece4;
      letter-spacing: 0.3px;
    }

    .logo-text p {
      font-size: 10px;
      color: #b0b0ca;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 1px;
    }

    /* Status */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0a0a10;
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 11px;
      color: #b0b0ca;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #2a2a3a;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .status-dot.active {
      background: #c8a97e;
      box-shadow: 0 0 8px rgba(200, 169, 126, 0.5);
    }

    .status-dot.error { background: #c87e7e; }

    /* Body */
    .body { padding: 16px; }

    /* Mode Toggle */
    .mode-toggle {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      background: #0a0a10;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 4px;
    }

    .mode-btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: #b0b0ca;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
    }

    .mode-btn.active {
      background: #1e1e2a;
      color: #c8a97e;
      border: 1px solid rgba(200, 169, 126, 0.2);
    }

    /* Settings */
    .settings {
      background: #0a0a10;
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    .setting-row:last-child { border-bottom: none; }

    .setting-label {
      font-size: 11px;
      color: #b0b0ca;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 500;
    }

    select {
      background: #13131a;
      border: 1px solid rgba(255,255,255,0.07);
      color: #c8a97e;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      outline: none;
    }

    select option { background: #13131a; }

    /* Buttons */
    .btn-start {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #c8a97e, #8b6f47);
      color: #0f0f14;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
      margin-bottom: 8px;
    }

    .btn-start:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-start:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    .btn-stop {
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(200, 126, 126, 0.2);
      border-radius: 10px;
      background: transparent;
      color: #c87e7e;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
      margin-bottom: 14px;
    }

    .btn-stop:hover { background: rgba(200, 126, 126, 0.05); }
    .btn-stop:disabled { opacity: 0.2; cursor: not-allowed; }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat {
      background: #0a0a10;
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 600;
      color: #c8a97e;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 9px;
      color: #b0b0ca;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-icon">◈</div>
      <div class="logo-text">
        <h1>SubtitleAI</h1>
        <p>Real-time · Any language</p>
      </div>
    </div>
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Ready — open a video tab</span>
    </div>
  </div>

  <div class="body">

    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="captions">CC Captions</button>
      <button class="mode-btn" data-mode="subtitles">⟷ Translate EN</button>
    </div>

    <div class="settings">
      <div class="setting-row">
        <span class="setting-label">Video Language</span>
        <select id="sourceLang">
          <option value="auto">Auto Detect</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="hi">Hindi</option>
          <option value="zh">Chinese</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="en">English</option>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label">Text Size</span>
        <select id="fontSize">
          <option value="18">Small</option>
          <option value="22" selected>Medium</option>
          <option value="28">Large</option>
        </select>
      </div>
    </div>

    <button class="btn-start" id="startBtn">▶ START SUBTITLES</button>
    <button class="btn-stop" id="stopBtn" disabled>■ STOP</button>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="latencyVal">--</div>
        <div class="stat-label">Latency ms</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="wordsVal">0</div>
        <div class="stat-label">Words</div>
      </div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
